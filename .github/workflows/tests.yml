name: Tests

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
    paths:
      - '**.php'

jobs:
  wpunit:
    name: WPUnit / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Setup environment
        run: cp .env.dist .env

      - name: Run wpunit tests
        run: FILTER="wpunit" PHP_VERSION=${{ matrix.php }} docker compose up --build --abort-on-container-exit --exit-code-from wordpress

      - name: Stop Docker environment
        if: always()
        run: docker compose down

  functional:
    name: Functional Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, intl
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Setup environment
        run: cp .env.dist .env

      - name: Run functional tests
        run: FILTER="functional" docker compose up --build --abort-on-container-exit --exit-code-from wordpress

      - name: Stop Docker environment
        if: always()
        run: docker compose down
